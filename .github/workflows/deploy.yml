name: Deploy

on:
  push:
    branches: [main, master]

env:
  DEPLOY_HOST: 20.119.179.146
  DEPLOY_USER: ardyn
  DEPLOY_PATH: /home/ardyn/ardyn-sentinel-portal
  WEBAPP_SERVICE: ads-webapp

jobs:
  # ── CI — runs in separate workflow, see ci.yml ─────────────────────────────

  # ── Deploy — requires manual approval via GitHub environment ──────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ardyn.ai
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes -i ~/.ssh/id_ed25519 \
            $DEPLOY_USER@$DEPLOY_HOST "echo 'SSH OK'"

      - name: Deploy to VM
        run: |
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes -i ~/.ssh/id_ed25519 \
            $DEPLOY_USER@$DEPLOY_HOST \
            "cd $DEPLOY_PATH && git reset --hard HEAD && git stash drop && git pull origin master && sudo systemctl restart $WEBAPP_SERVICE"

      - name: Health check
        run: |
          sleep 5
          curl -sf --max-time 10 http://$DEPLOY_HOST:8080/health \
            && echo "Health OK" \
            || { echo "Health check FAILED"; exit 1; }

      - name: Verify chain API
        run: |
          curl -sf --max-time 10 http://$DEPLOY_HOST:8080/api/verify/chain \
            && echo "Chain API OK" \
            || echo "Chain API check completed"

  # ── Rollback ────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rollback to previous commit
        run: |
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes -i ~/.ssh/id_ed25519 \
            $DEPLOY_USER@$DEPLOY_HOST \
            "cd $DEPLOY_PATH && git reset --hard HEAD~1 && sudo systemctl restart $WEBAPP_SERVICE"

      - name: Health check after rollback
        run: |
          sleep 5
          curl -sf --max-time 10 http://$DEPLOY_HOST:8080/health \
            && echo "Rollback health OK" \
            || { echo "Rollback health check FAILED"; exit 1; }
