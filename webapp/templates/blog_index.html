<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Ardyn</title>
<meta name="description" content="Insights on AI compliance, cryptographic data destruction, and sovereignty events from the Ardyn team.">
<meta property="og:title" content="Ardyn Blog — AI Compliance & Data Sovereignty">
<meta property="og:description" content="Insights on AI compliance, cryptographic data destruction, and sovereignty events.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ardyn.ai/blog">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:#FAFAF9;color:#1a1a1a;-webkit-font-smoothing:antialiased}
  .blog-header{max-width:780px;margin:0 auto;padding:60px 24px 20px}
  .blog-header h1{font-size:2rem;font-weight:700;letter-spacing:-0.03em;color:#111}
  .blog-header p{color:#666;margin-top:8px;font-size:1rem}
  .blog-header nav{margin-bottom:32px;font-size:0.875rem}
  .blog-header nav a{color:#D97706;text-decoration:none;font-weight:500}
  .blog-header nav a:hover{text-decoration:underline}
  .posts{max-width:780px;margin:0 auto;padding:0 24px 80px}
  .post-card{background:#fff;border:1px solid #e8e5e0;border-radius:12px;padding:28px 32px;margin-bottom:16px;transition:box-shadow .15s,border-color .15s;text-decoration:none;display:block;color:inherit}
  .post-card:hover{border-color:#D97706;box-shadow:0 2px 12px rgba(0,0,0,.06)}
  .post-card h2{font-size:1.2rem;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px}
  .post-meta{font-size:0.8rem;color:#999;margin-bottom:10px}
  .post-card p{font-size:0.925rem;color:#555;line-height:1.6}
  .tag{display:inline-block;font-size:0.7rem;background:#FEF3C7;color:#92400E;padding:2px 8px;border-radius:99px;margin-right:4px;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="blog-header">
  <nav><a href="/">← Back to Ardyn</a></nav>
  <h1>Blog</h1>
  <p>Insights on AI compliance, data sovereignty, and cryptographic proof.</p>
</div>
<div class="posts">
  {% for post in posts %}
  <a href="/blog/{{ post.slug }}" class="post-card">
    <h2>{{ post.title }}</h2>
    <div class="post-meta">{{ post.date.strftime('%B %d, %Y') }} · {{ post.author }}</div>
    <p>{{ post.description }}</p>
    <div>
      {% for tag in post.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </div>
  </a>
  {% endfor %}
</div>
</body>
</html>
