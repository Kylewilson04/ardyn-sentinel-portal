<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Ardyn Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #09090b;
    color: #fafafa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 400px;
    padding: 2.5rem;
    margin: 1rem;
  }
  .logo {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .logo h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 0.25rem;
  }
  .logo h1 span { color: #00fff2; }
  .logo p {
    color: #71717a;
    font-size: 0.875rem;
    font-weight: 300;
  }
  .error {
    background: rgba(220, 38, 38, 0.1);
    border: 1px solid rgba(220, 38, 38, 0.3);
    color: #fca5a5;
    padding: 0.75rem 1rem;
    border-radius: 0.5rem;
    margin-bottom: 1.5rem;
    font-size: 0.875rem;
  }
  label {
    display: block;
    font-size: 0.8rem;
    color: #a1a1aa;
    margin-bottom: 0.375rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid #27272a;
    border-radius: 0.5rem;
    color: #fafafa;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.25rem;
  }
  input:focus { border-color: #00fff2; }
  input::placeholder { color: #52525b; }
  button {
    width: 100%;
    padding: 0.75rem;
    background: #00fff2;
    color: #09090b;
    border: none;
    border-radius: 0.5rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 0.5rem;
  }
  button:hover { opacity: 0.85; }
  .footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: #52525b;
  }
  .footer a { color: #00fff2; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
  .divider {
    border-top: 1px solid #18181b;
    margin: 2rem 0 1.5rem;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Ardyn<span>.</span></h1>
    <p>Atomic Data Sovereignty</p>
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/login">
    {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="you@company.com" autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required placeholder="••••••••">
    <button type="submit">Sign In</button>
  </form>
  <div class="divider"></div>
  <div class="footer">
    <a href="/">← Back to ardyn.ai</a>
  </div>
</div>
</body>
</html>
