<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Ardyn AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<style>
.auth-logo-text {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, #D97706 0%, #F59E0B 50%, #D97706 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}
.auth-tagline {
  font-size: 1rem;
  color: #666;
  margin-top: 4px;
}
.auth-subtitle {
  font-size: 0.95rem;
  color: #888;
  margin-top: 16px;
}
.privacy-note {
  background: #f0fdf4;
  border-left: 3px solid #22c55e;
  padding: 12px 16px;
  border-radius: 0 8px 8px 0;
  margin-bottom: 20px;
  font-size: 0.85rem;
  color: #166534;
}
</style>
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo" style="text-align: center; margin-bottom: 24px;">
      <img src="/static/logo-2025.svg" alt="Ardyn" width="48" height="48" style="margin-bottom: 12px;">
      <div class="auth-logo-text">Ardyn AI</div>
      <div class="auth-tagline">Private AI. Zero Trace.</div>
      <p class="auth-subtitle">Create your account</p>
    </div>
    
    <div class="privacy-note">
      <strong>🔒 Your privacy is guaranteed</strong><br>
      Your data is encrypted, never leaves your control, and cannot be used to train AI models.
    </div>
    
    {% if error %}
    <div class="auth-error" style="background: #fef2f2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem;">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/register" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@company.com" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••" minlength="8">
        <small style="color: #888; font-size: 0.8rem;">At least 8 characters</small>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top: 8px;">Create Account</button>
    </form>
    <p class="auth-switch" style="text-align: center; margin-top: 20px; color: #666; font-size: 0.9rem;">Already have an account? <a href="/login" style="color: #D97706; font-weight: 600;">Sign in</a></p>
  </div>
</div>
</body>
</html>
